version: "3.9"
# NekoCafe 本地开发栈 — docker compose up 一键启动全部服务
# 要求: Docker Desktop 24+ / Docker Compose v2.20+
# 启动: docker compose up -d --build
# 验证: curl http://localhost:8081/health

services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.0-debian
    container_name: nekocafe-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: nekocafe_root
      MYSQL_DATABASE: nekocafe
      MYSQL_USER: nekocafe
      MYSQL_PASSWORD: nekocafe_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nekocafe-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnami/kafka:3.5
    container_name: nekocafe-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== 微服务 ====================
  reservation-service:
    build:
      context: ./services/reservation
      dockerfile: Dockerfile
    container_name: nekocafe-reservation
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/nekocafe?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: nekocafe
      SPRING_DATASOURCE_PASSWORD: nekocafe_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: reservation-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      JAVA_TOOL_OPTIONS: "-javaagent:/app/opentelemetry-javaagent.jar"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  member-service:
    build:
      context: ./services/member
      dockerfile: Dockerfile
    container_name: nekocafe-member
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: nekocafe
      DB_PASSWORD: nekocafe_pass
      DB_NAME: nekocafe
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      OTEL_SERVICE_NAME: member-service
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ==================== 可观测性 ====================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: nekocafe-otel
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: nekocafe-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.3.0
    container_name: nekocafe-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: nekocafe_admin
    volumes:
      - ./infra/observability/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mysql-data:
